name: Cross-Platform Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and upload assets for
        required: true
        type: string
      build_windows:
        description: Build Windows assets in CI (disable when build.bat already published them)
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # Windows is normally built and signed locally via build.bat, but this job lets
  # a release be cut entirely from macOS/Linux: it reuses build.bat unchanged
  # (via a code-signing cert imported from the WINDOWS_CODESIGN_PFX/PASSWORD
  # secrets) and only runs on workflow_dispatch when build_windows is enabled,
  # since it needs an existing release tag to build against and upload assets to.
  windows:
    name: Build Windows Artifact
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install VLC and Inno Setup
        run: |
          choco install vlc --no-progress -y
          choco install innosetup --no-progress -y

      - name: Locate signtool
        id: signtool
        run: |
          $found = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $found) { throw "signtool.exe not found on this runner image" }
          "path=$($found.FullName)" >> $env:GITHUB_OUTPUT

      - name: Import code-signing certificate
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "blindrss-codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))
          $securePwd = ConvertTo-SecureString -String $env:PFX_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePwd | Out-Null
          Remove-Item $pfxPath -Force

      - name: Build, sign, and package Windows release
        env:
          SIGNTOOL_PATH: ${{ steps.signtool.outputs.path }}
        run: .\build.bat build

      - name: Compute checksums and write update manifest
        id: manifest
        run: |
          $version = "${{ inputs.release_tag }}".TrimStart('v')
          $zip = "dist\BlindRSS-v$version.zip"
          $installer = "dist\BlindRSS-Setup-v$version.exe"
          $zipSha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $installerSha = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLower()
          $thumbprint = (Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Select-Object -First 1).Thumbprint
          .venv\Scripts\python.exe tools\release.py write-manifest `
            --version-tag "${{ inputs.release_tag }}" `
            --asset-name (Split-Path $zip -Leaf) `
            --sha256 $zipSha `
            --installer-asset-name (Split-Path $installer -Leaf) `
            --installer-sha256 $installerSha `
            --output dist\BlindRSS-update.json `
            --signing-thumbprint $thumbprint
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "installer=$installer" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-windows-${{ inputs.release_tag }}
          path: |
            dist/BlindRSS-v*.zip
            dist/BlindRSS-Setup-v*.exe
            dist/BlindRSS-update.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "${{ steps.manifest.outputs.zip }}" "${{ steps.manifest.outputs.installer }}" dist\BlindRSS-update.json --clobber

  macos:
    name: Build macOS Artifact
    runs-on: macos-14
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macOS build dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: Build macOS package
        env:
          BLINDRSS_VLC_VERSION: "3.0.23"
        run: |
          chmod +x build.sh
          ./build.sh build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-macos-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          path: dist/BlindRSS-macos-*.zip

      - name: Upload release asset
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-macos-*.zip --clobber

      - name: Publish macOS update manifest
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="$(ls dist/BlindRSS-macos-*.zip | head -n1)"
          ASSET_NAME="$(basename "$ASSET")"
          SHA="$(shasum -a 256 "$ASSET" | awk '{print $1}')"
          python tools/release.py write-manifest \
            --version-tag "${{ inputs.release_tag }}" \
            --asset-name "$ASSET_NAME" \
            --sha256 "$SHA" \
            --output dist/BlindRSS-update-macos.json
          gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-update-macos.json --clobber

  linux:
    name: Build Linux Artifact
    runs-on: ubuntu-22.04
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            vlc libvlc-dev ffmpeg \
            libgtk-3-0 libsdl2-2.0-0 libnotify4 \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0

      - name: Build Linux package
        env:
          # wxPython has no universal Linux pip wheel; use the prebuilt GTK3
          # wheels matching this runner's Ubuntu version to avoid a source build.
          PIP_FIND_LINKS: https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04
        run: |
          chmod +x build.sh
          ./build.sh build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-linux-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          path: dist/BlindRSS-linux-*.tar.gz

      - name: Upload release asset
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-linux-*.tar.gz --clobber

      - name: Publish Linux update manifest
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="$(ls dist/BlindRSS-linux-*.tar.gz | head -n1)"
          ASSET_NAME="$(basename "$ASSET")"
          SHA="$(sha256sum "$ASSET" | awk '{print $1}')"
          python tools/release.py write-manifest \
            --version-tag "${{ inputs.release_tag }}" \
            --asset-name "$ASSET_NAME" \
            --sha256 "$SHA" \
            --output dist/BlindRSS-update-linux.json
          gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-update-linux.json --clobber
