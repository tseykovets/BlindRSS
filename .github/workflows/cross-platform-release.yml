name: Cross-Platform Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    if: ${{ github.event_name == 'push' }}
    name: Build Windows Artifact
    runs-on: windows-2022
    steps:
      - name: Check out current commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Windows build dependencies
        shell: powershell
        run: choco install vlc -y --no-progress

      - name: Build Windows package
        shell: cmd
        run: |
          set SKIP_SIGN=1
          call build.bat build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-windows-${{ github.sha }}
          path: dist/BlindRSS-v*.zip

  macos:
    name: Build macOS Artifact
    runs-on: macos-14
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macOS build dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: Build macOS package
        env:
          BLINDRSS_VLC_VERSION: "3.0.23"
        run: |
          chmod +x build.sh
          ./build.sh build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-macos-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          path: dist/BlindRSS-macos-*.zip

      - name: Upload release asset
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-macos-*.zip --clobber

      - name: Publish macOS update manifest
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="$(ls dist/BlindRSS-macos-*.zip | head -n1)"
          ASSET_NAME="$(basename "$ASSET")"
          SHA="$(shasum -a 256 "$ASSET" | awk '{print $1}')"
          python tools/release.py write-manifest \
            --version-tag "${{ inputs.release_tag }}" \
            --asset-name "$ASSET_NAME" \
            --sha256 "$SHA" \
            --output dist/BlindRSS-update-macos.json
          gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-update-macos.json --clobber

  linux:
    name: Build Linux Artifact
    runs-on: ubuntu-22.04
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            vlc libvlc-dev ffmpeg \
            libgtk-3-0 libsdl2-2.0-0 libnotify4 \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0

      - name: Build Linux package
        env:
          # wxPython has no universal Linux pip wheel; use the prebuilt GTK3
          # wheels matching this runner's Ubuntu version to avoid a source build.
          PIP_FIND_LINKS: https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04
        run: |
          chmod +x build.sh
          ./build.sh build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-linux-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          path: dist/BlindRSS-linux-*.tar.gz

      - name: Upload release asset
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-linux-*.tar.gz --clobber

      - name: Publish Linux update manifest
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="$(ls dist/BlindRSS-linux-*.tar.gz | head -n1)"
          ASSET_NAME="$(basename "$ASSET")"
          SHA="$(sha256sum "$ASSET" | awk '{print $1}')"
          python tools/release.py write-manifest \
            --version-tag "${{ inputs.release_tag }}" \
            --asset-name "$ASSET_NAME" \
            --sha256 "$SHA" \
            --output dist/BlindRSS-update-linux.json
          gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-update-linux.json --clobber
