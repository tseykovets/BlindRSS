[pytest]
testpaths = tests
addopts = --basetemp=.tmp_test/pytest
filterwarnings =
    ignore:pkg_resources is deprecated as an API.*:UserWarning:webrtcvad
    # mf2py (pulled in by extruct for core/metadata_enrich) still calls
    # codecs.open() in mf2py/backcompat.py, which Python 3.14 deprecated.
    # Third-party, not fixable here; matched by exact message + module.
    ignore:codecs\.open\(\) is deprecated:DeprecationWarning:mf2py\.backcompat
