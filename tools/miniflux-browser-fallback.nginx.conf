# Same-origin, Miniflux-token-authenticated direct-browser fallback.
# The trailing slash on proxy_pass strips /blindrss-browser-feed/ so the
# localhost service receives /health and /v1/*.
location ^~ /blindrss-browser-feed/ {
    access_by_lua_file /dev/null;
    client_max_body_size 64k;
    proxy_pass http://127.0.0.1:12794/;
    include proxy_params_with_auth_keepalive;
    proxy_connect_timeout 5s;
    proxy_read_timeout 150s;
    proxy_send_timeout 30s;
    proxy_buffering off;
}
